independent:
  intro: Personal work, built and run on my own infrastructure. Where I keep my hands in the actual engineering.
  items:
    - "Self-hosted agent runtime: a containerised harness on my NAS that hosts autonomous agents, fronted by TLS and auth, with a Telegram channel and scheduled jobs. I own it end to end: Docker, networking, reliability."
    - "Custom MCP server (access to my digital brain): an MCP server I wrote that exposes 20+ tools over my knowledge base (search, read and write, task capture, hygiene, tiered session-context priming), reachable over a Cloudflare tunnel and consumed by several agents and web LLM connectors."
    - "Autonomous daily intelligence brief: an agent that ingests video transcripts, social posts, newsletters, news feeds and other LLM passes, then tiers sources, detects convergence, gates on freshness, and routes work across cheaper and stronger models to keep cost sane. Effectively a small one-person AI product providing inteligent news gathering."
    - "Multi-agent reasoning pipelines: parallel reconnaissance agents for research, and a gated strategy pipeline that runs an adversarial critic against a hypothesis and labels each claim with a confidence level."
    - "Model fine-tuning: QLoRA fine-tuning of small language models on my RTX 4070 in WSL using axolotl, dataset curation to JSONL, preprocessing, training, inference, adapter merge, and eval. Ongoing and deliberately hands-on. Next planned step is to apply Ralph Loops to this processes for targeted use cases."
    - "Self-improving tooling: a skill and agent library with usage telemetry and an automated review loop that flags what to improve, actively nudging me to review when needed."

