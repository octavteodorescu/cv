  - "Service-management heritage: ITSM, AMS, ServiceNow, SIAM, AIOps, intelligent ticket analysis - the operations depth the AI work builds on"

highlights:
  - "Built and run a self-hosted multi-agent stack on my own NAS: a containerised agent runtime, a custom MCP server exposing 20+ tools, and a daily autonomous intelligence-brief agent with a multi-source ingest pipeline. In real production use, not a weekend prototype."
  - "Delivered production multi-agent solutions on Copilot Studio and Power Automate, including an intelligent ticket-analysis system built from multiple specialist agents, with a strict data-handling boundary and automated report generation."
  - "Shaped enterprise transformation solutions across banking, insurance, energy, manufacturing, life sciences, and private equity, with deal values in the $25-50M range."
  - "Fine-tuned small language models end to end on my own RTX 4070 (QLoRA, axolotl, dataset curation through to inference and adapter merge), to build real depth in the training stack, and am now extending it with Ralph-style agent loops on targeted use cases."
  - "Cut infrastructure cost by around 25% and deployment time by roughly 70% on a cloud automation programme using IaC, CI/CD, and platform engineering."
  - "Led private cloud architecture for a major UK bank under strict regulatory and security constraints, reaching 99.9% uptime across a two-year on-site engagement."

