profile: >
  Solution architect with 18+ years in enterprise technology, the last few of them spent
  hands-on building AI. I shape large transformation deals (usually $25-50M) for banking,
  insurance, energy, manufacturing and life-sciences clients, owning the design from operating
  model through to architecture and commercials. Alongside that I design, build and run agentic
  AI systems, both at work and on my own: multi-agent orchestration, MCP tool servers, retrieval
  pipelines, and a self-hosted agent runtime that runs in production on my own infrastructure.
  I also fine-tune small language models on my local GPU, to understand the stack from the
  weights up rather than only from the slide deck. Most architects at my level stopped touching
  the keyboard years ago. I didn't.

focus:
