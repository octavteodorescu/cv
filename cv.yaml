linkedin:
  headline: "AI Agent Builder & Lead Solution Architect | LLM apps, multi-agent systems, MCP, RAG | I design enterprise AI and ship the agents myself | Python, Cloud"
  about: |
    I'm a solution architect who builds. Eighteen-plus years shaping enterprise technology, and the last few of them building AI agents with my own hands, not just drawing them on slides. I ship and run the agents most architects only diagram.

    By day I shape large transformation deals (often $25-50M) for banks, insurers, energy, manufacturing and life-sciences clients, owning the design from operating model through to architecture and commercials.

    The less common part at my level: I build the AI too. I run a self-hosted multi-agent stack on a NAS in my house. I wrote a custom MCP (Model Context Protocol) server that exposes 20+ tools over my own knowledge base, and several agents plus web LLM connectors use it daily. One of them reads video, social, newsletters and news every morning, tiers the sources, spots convergence, and routes work across cheaper and stronger models to keep cost down. It's basically a tiny one-person AI product.

    That instinct shows up at work too: I've delivered production multi-agent solutions for enterprise clients on Copilot Studio and Power Automate, including a ticket-analysis system built from multiple specialist agents behind a strict data boundary.

    I also fine-tune small language models on a single GPU (QLoRA, axolotl, the full loop from dataset to eval), now extending it with Ralph-style agent loops, because I'd rather understand the stack down to the weights than only from the API.

    If you're building agentic AI and want someone who can both talk to a CIO and open the editor, let's talk.

    Tools: AI agents, agentic AI, multi-agent orchestration, LLMs, MCP, RAG, prompt engineering, evals, Anthropic Claude, fine-tuning (LoRA/QLoRA), Python, Docker, Azure/AWS/GCP, Kubernetes, Terraform, Copilot Studio, Power Automate.
